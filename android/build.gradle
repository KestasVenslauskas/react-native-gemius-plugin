buildscript {
  ext.LRTGemiusPlugin = [
    kotlinVersion: "2.0.21",
    minSdkVersion: 24,
    compileSdkVersion: 36,
    targetSdkVersion: 36
  ]

  ext.getExtOrDefault = { prop ->
    if (rootProject.ext.has(prop)) {
      return rootProject.ext.get(prop)
    }

    return LRTGemiusPlugin[prop]
  }

  repositories {
    google()
    mavenCentral()
  }

  dependencies {
    classpath "com.android.tools.build:gradle:8.7.2"
    // noinspection DifferentKotlinGradleVersion
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:${getExtOrDefault('kotlinVersion')}"
  }
}


apply plugin: "com.android.library"
apply plugin: "kotlin-android"

apply plugin: "com.facebook.react"

repositories {
  maven { url 'https://developer.huawei.com/repo/' }
}

android {
  namespace "com.gemiusplugin"

  compileSdkVersion getExtOrDefault("compileSdkVersion")

  defaultConfig {
    minSdkVersion getExtOrDefault("minSdkVersion")
    targetSdkVersion getExtOrDefault("targetSdkVersion")
  }

  buildFeatures {
    buildConfig true
  }

  buildTypes {
    release {
      minifyEnabled false
    }
  }

  lint {
    disable "GradleCompatible"
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_1_8
    targetCompatibility JavaVersion.VERSION_1_8
  }
}

dependencies {
  implementation "com.facebook.react:react-android"

  // Gemius SDK (local AAR)
  implementation files('libs/mobile-sdk-2.3.0.aar')

  // Gemius SDK transitive dependencies
  implementation "com.huawei.hms:ads-identifier:3.4.58.301"
  implementation "com.google.code.gson:gson:2.11.0"
  implementation "com.google.android.gms:play-services-base:18.7.2"
  implementation "com.google.android.gms:play-services-ads:24.5.0"
  implementation "com.google.android.gms:play-services-appset:16.1.0"
  implementation "androidx.core:core:1.17.0"
  implementation "androidx.preference:preference:1.2.1"
  implementation "androidx.lifecycle:lifecycle-process:2.9.1"
  implementation "com.squareup.retrofit2:retrofit:2.11.0"
  implementation "com.squareup.retrofit2:converter-scalars:2.11.0"
  implementation "com.squareup.okhttp3:logging-interceptor:4.12.0"
  implementation "ch.acra:acra-http:5.7.0"
}
